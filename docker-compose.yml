services:
  mongodb:
    container_name: mongodb
    image: 'mongo:latest'
    restart: always
    ports:
      - '27018:27017'
    volumes:
      - mongodb-data:/data/db
    environment:
      - 'MONGO_INITDB_DATABASE=learning_machines'

  postgres:
    container_name: postgres
    image: 'postgres:latest'
    restart: always
    ports:
      - '5432:5432'
    environment:
      - 'POSTGRES_DB=learning_machines'
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=admin'
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  mongodb-data:
    driver: local
  postgres-data:
    driver: local